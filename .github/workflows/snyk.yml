name: Snyk

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  open-source:
    name: Snyk (${{ matrix.project }})
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        project:
          - services/posts
          - services/scraper
          - services/subreddits
          - webui

    steps:
      - name: Check Snyk configuration
        if: env.SNYK_TOKEN == ''
        run: echo "::warning::SNYK_TOKEN is not configured; skipping Snyk scan."

      - name: Checkout
        if: env.SNYK_TOKEN != ''
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Use Node.js 24.x
        if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install dependencies
        if: env.SNYK_TOKEN != ''
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Scan dependencies
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        with:
          args: >-
            --file=${{ matrix.project }}/package.json
            --package-manager=npm
            --severity-threshold=high
